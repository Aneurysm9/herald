name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build:
    name: Build static binary (${{ matrix.target }})
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64
            flake: heraldStatic
          - target: aarch64
            flake: heraldStaticAarch64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - name: Build static musl binary
        run: nix build .#${{ matrix.flake }}
      - name: Prepare artifacts
        run: |
          cp result/bin/herald herald-linux-${{ matrix.target }}
          sha256sum herald-linux-${{ matrix.target }} > herald-linux-${{ matrix.target }}.sha256
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binary-${{ matrix.target }}
          path: |
            herald-linux-${{ matrix.target }}
            herald-linux-${{ matrix.target }}.sha256

  changelog:
    name: Generate changelog
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@e16f179f0be49ecdfe63753837f20b9531642772 # v4.7.0
        with:
          config: cliff.toml
          args: --latest --strip header

  release:
    name: Create GitHub release
    needs: [build, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-*
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          body: ${{ needs.changelog.outputs.changelog }}
          files: |
            herald-linux-x86_64
            herald-linux-x86_64.sha256
            herald-linux-aarch64
            herald-linux-aarch64.sha256
